name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "## 📝 Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%an)" $PREVIOUS_TAG..HEAD >> CHANGELOG.md
          else
            echo "## 📝 Initial Release" > CHANGELOG.md
          fi
          
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          release_name: Gmail Transfer Tool ${{ steps.get_version.outputs.VERSION }}
          body: |
            # 🚀 Gmail Transfer Tool ${{ steps.get_version.outputs.VERSION }}
            
            Профессиональный инструмент для переноса почты между сотрудниками в Google Workspace.
            
            ## 🐳 Docker Images
            
            ### Production
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION_NUMBER }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```
            
            ### Development
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dev:${{ steps.get_version.outputs.VERSION_NUMBER }}
            ```
            
            ## 🚀 Quick Start
            
            ### Веб-интерфейс
            ```bash
            docker run -d \
              --name gmail-transfer \
              -p 5000:5000 \
              -v $(pwd)/.env:/app/.env \
              -v $(pwd)/service-account-key.json:/app/service-account-key.json \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION_NUMBER }}
            
            # Откройте http://localhost:5000
            ```
            
            ### CLI
            ```bash
            docker run --rm -it \
              -v $(pwd)/.env:/app/.env \
              -v $(pwd)/service-account-key.json:/app/service-account-key.json \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION_NUMBER }} \
              python main.py old@company.com new@company.com
            ```
            
            ### Docker Compose
            ```bash
            curl -O https://raw.githubusercontent.com/noragami90/gmail_transfer/${{ steps.get_version.outputs.VERSION }}/docker-compose.yml
            docker-compose up -d
            ```
            
            ## 📋 Что нового?
            
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## 📚 Документация
            
            - [README.md](https://github.com/noragami90/gmail_transfer/blob/main/README.md) - Полная документация
            - [QUICK_START.md](https://github.com/noragami90/gmail_transfer/blob/main/QUICK_START.md) - Быстрый старт
            - [DOCKER_README.md](https://github.com/noragami90/gmail_transfer/blob/main/DOCKER_README.md) - Docker guide
            
            ## 🔧 Системные требования
            
            - Docker 20.10+
            - Docker Compose 2.0+
            - Google Workspace с правами администратора
            - Сервисный аккаунт Google Cloud
            
            ## 🐛 Известные проблемы
            
            См. [Issues](https://github.com/noragami90/gmail_transfer/issues)
            
            ## 💝 Поддержка проекта
            
            Если проект полезен, поставьте ⭐ на GitHub!
          draft: false
          prerelease: false

  build-release-assets:
    name: 🔨 Build Release Assets
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
      packages: read

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r web_requirements.txt
          pip install pyinstaller

      - name: Build standalone executable
        run: |
          # Создаем standalone версию
          pyinstaller --onefile \
            --name gmail-transfer-cli-${{ matrix.arch }} \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import=googleapiclient \
            --hidden-import=google.auth \
            --hidden-import=flask \
            main.py

      - name: Create distribution archive
        run: |
          mkdir -p dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}
          
          # Копируем файлы
          cp dist/gmail-transfer-cli-${{ matrix.arch }} dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/
          cp README.md QUICK_START.md DOCKER_README.md dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/
          cp requirements.txt web_requirements.txt dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/
          cp env_example.txt dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/.env.example
          cp docker-compose.yml dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/
          cp makefile dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}/Makefile
          
          # Создаем архив
          cd dist
          tar -czf gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}
          
          # Создаем checksums
          sha256sum gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz > gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz
          asset_name: gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./dist/gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz.sha256
          asset_name: gmail-transfer-${{ steps.get_version.outputs.VERSION }}-${{ matrix.arch }}.tar.gz.sha256
          asset_content_type: text/plain

  docker-compose-assets:
    name: 📄 Create Docker Compose Assets
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Quick Start Package
        run: |
          mkdir -p quick-start
          
          # Основные файлы для быстрого старта
          cp docker-compose.yml quick-start/
          cp env_example.txt quick-start/.env.example
          cp QUICK_START.md quick-start/README.md
          cp DOCKER_README.md quick-start/
          
          # Создаем setup script
          cat > quick-start/setup.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🚀 Gmail Transfer Tool - Quick Setup"
          echo "===================================="
          
          # Проверяем Docker
          if ! command -v docker &> /dev/null; then
              echo "❌ Docker не найден. Установите Docker первым."
              exit 1
          fi
          
          if ! command -v docker-compose &> /dev/null; then
              echo "❌ Docker Compose не найден. Установите Docker Compose."
              exit 1
          fi
          
          # Создаем .env если не существует
          if [ ! -f .env ]; then
              echo "📝 Создание .env файла..."
              cp .env.example .env
              echo "⚠️  Отредактируйте .env файл перед запуском!"
          fi
          
          # Проверяем service account файл
          if [ ! -f service-account-key.json ]; then
              echo "⚠️  Поместите ваш service-account-key.json в эту директорию"
              echo "📖 Подробности в README.md"
          fi
          
          echo "✅ Настройка завершена!"
          echo ""
          echo "Следующие шаги:"
          echo "1. Отредактируйте .env файл"
          echo "2. Поместите service-account-key.json"
          echo "3. Запустите: docker-compose up -d"
          echo "4. Откройте: http://localhost:5000"
          EOF
          
          chmod +x quick-start/setup.sh
          
          # Создаем архив
          tar -czf gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz quick-start/
          
          # Checksum
          sha256sum gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz > gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz.sha256

      - name: Upload Quick Start Package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz
          asset_name: gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Quick Start Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz.sha256
          asset_name: gmail-transfer-quick-start-${{ steps.get_version.outputs.VERSION }}.tar.gz.sha256
          asset_content_type: text/plain

  notify-release:
    name: 📢 Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-release-assets, docker-compose-assets]
    if: always()

    steps:
      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create success summary
        if: needs.create-release.result == 'success'
        run: |
          echo "## ✅ Release ${{ steps.get_version.outputs.VERSION }} Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Assets:" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Docker Images: \`ghcr.io/noragami90/gmail_transfer:${{ steps.get_version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 CLI Binaries: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Quick Start Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Page](https://github.com/noragami90/gmail_transfer/releases/tag/${{ steps.get_version.outputs.VERSION }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://github.com/noragami90/gmail_transfer/pkgs/container/gmail_transfer)" >> $GITHUB_STEP_SUMMARY

      - name: Create failure summary
        if: needs.create-release.result == 'failure'
        run: |
          echo "## ❌ Release ${{ steps.get_version.outputs.VERSION }} Failed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
