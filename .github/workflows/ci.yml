name: 🔄 Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Тестирование на разных версиях Python
  test:
    name: 🧪 Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/web_requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-flask pytest-cov pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f web_requirements.txt ]; then pip install -r web_requirements.txt; fi

      - name: Create test environment file
        run: |
          cat > .env << EOF
          SERVICE_ACCOUNT_FILE=test_service_account.json
          WORKSPACE_DOMAIN=test.example.com
          LOG_LEVEL=DEBUG
          BATCH_SIZE=10
          API_DELAY=0.01
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Create mock service account file
        run: |
          cat > test_service_account.json << EOF
          {
            "type": "service_account",
            "project_id": "test-project",
            "private_key_id": "test-key-id",
            "private_key": "-----BEGIN PRIVATE KEY-----\ntest-private-key\n-----END PRIVATE KEY-----\n",
            "client_email": "test@test-project.iam.gserviceaccount.com",
            "client_id": "123456789",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token"
          }
          EOF

      - name: Run tests
        run: |
          # Создаем директории для тестов
          mkdir -p logs templates static/css static/js
          
          # Запускаем тесты с покрытием
          pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term
        env:
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Проверка качества кода
  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy bandit safety

      - name: Check code formatting with Black
        run: |
          black --check --diff .

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff .

      - name: Lint with flake8
        run: |
          flake8 . --count --statistics

      - name: Type checking with mypy
        run: |
          mypy . --ignore-missing-imports --no-strict-optional

      - name: Security check with bandit
        run: |
          bandit -r . -f json -o bandit-report.json
        continue-on-error: true

      - name: Check dependencies with safety
        run: |
          pip install -r requirements.txt -r web_requirements.txt
          safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Проверка Docker сборки
  docker-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker build (Production)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: gmail-transfer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker build (Development)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: false
          tags: gmail-transfer-dev:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose
        run: |
          # Создаем тестовые файлы
          echo "SERVICE_ACCOUNT_FILE=test.json" > .env
          echo "WORKSPACE_DOMAIN=test.com" >> .env
          echo "{}" > service-account-key.json
          
          # Проверяем docker-compose конфигурацию
          docker-compose -f docker-compose.yml config
          docker-compose -f docker-compose.dev.yml config

  # Проверка документации
  docs-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README
        run: |
          # Проверяем наличие основных разделов в README
          grep -q "# Gmail Transfer Tool" README.md
          grep -q "## Установка" README.md
          grep -q "## Использование" README.md
          grep -q "## Настройка" README.md

      - name: Check links in documentation
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc_config.json'

      - name: Spell check
        uses: streetsidesoftware/cspell-action@v5
        with:
          files: |
            README.md
            QUICK_START.md
            **/*.md
