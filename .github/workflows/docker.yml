name: 🐳 Build and Push Docker Images

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: 🏗️ Build & Push Production Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Make package public
        # Делает опубликованный пакет GHCR публичным, чтобы docker pull работал
        # без авторизации. Видимость "залипает" — достаточно одного успешного раза.
        # GITHUB_TOKEN обычно справляется (он админ созданного пакета); при нехватке
        # прав задайте секрет PACKAGES_TOKEN (PAT со scope write:packages).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PKG="${GITHUB_REPOSITORY##*/}"
          echo "Setting GHCR package '${PKG}' visibility to public…"
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.github.com/user/packages/container/${PKG}/visibility" \
            -d '{"visibility":"public"}')
          echo "GitHub API responded: HTTP ${code}"
          if [ "${code}" = "204" ]; then
            echo "✅ Пакет теперь публичный"
          else
            echo "⚠️ Не удалось изменить видимость автоматически (HTTP ${code})."
            echo "   Сделайте это один раз вручную: Packages → ${PKG} → Package settings → Change visibility → Public,"
            echo "   либо добавьте секрет PACKAGES_TOKEN (PAT со scope write:packages)."
          fi
