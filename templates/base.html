<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gmail Transfer{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body>
    {% set active_page = active_page|default('') %}
    <header class="app-navbar">
        <div class="container-nav">
            <a class="app-brand" href="/">
                <span class="brand-mark"><i class="bi bi-envelope-arrow-up-fill"></i></span>
                Gmail Transfer
            </a>
            <nav class="app-nav">
                <a href="/" class="{{ 'active' if active_page == 'home' }}">
                    <i class="bi bi-grid-1x2"></i><span class="nav-text">Главная</span>
                </a>
                <a href="/single" class="{{ 'active' if active_page == 'single' }}">
                    <i class="bi bi-arrow-left-right"></i><span class="nav-text">Одиночный</span>
                </a>
                <a href="/bulk" class="{{ 'active' if active_page == 'bulk' }}">
                    <i class="bi bi-collection"></i><span class="nav-text">Массовый</span>
                </a>
                <a href="/history" class="{{ 'active' if active_page == 'history' }}">
                    <i class="bi bi-clock-history"></i><span class="nav-text">История</span>
                </a>
            </nav>
            <span class="status-pill" id="statusPill" title="Состояние подключения к Gmail API">
                <span class="dot"></span><span class="pill-text">Проверка…</span>
            </span>
        </div>
    </header>

    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <div class="container-nav">
            <span><i class="bi bi-shield-check me-1 text-accent"></i>Безопасный перенос почты через Google Workspace API</span>
            <a href="https://github.com/noragami90/gmail_transfer" target="_blank" rel="noopener">
                <i class="bi bi-github me-1"></i>Gmail Transfer Tool
            </a>
        </div>
    </footer>

    <!-- Toast notifications -->
    <div class="toast-stack" id="toastStack"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
