version: '3.8'

services:
  # Локальная разработка с build
  gmail-transfer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmail-transfer-dev
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=true
      - PORT=5000
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - gmail-transfer-network

  # Redis для разработки
  redis:
    image: redis:7-alpine
    container_name: gmail-transfer-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    networks:
      - gmail-transfer-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_dev_data:
    driver: local

networks:
  gmail-transfer-network:
    driver: bridge